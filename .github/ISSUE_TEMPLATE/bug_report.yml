name: Bug report
description: Something in phylo-rs behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. A short reproducer is worth
        far more than a description — a Newick string and a few lines of code
        usually tells us everything we need.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Reproducer
      description: >
        The smallest snippet that shows the problem. Include the input tree
        (Newick or otherwise) if the bug depends on it.
      render: rust
      placeholder: |
        use phylo::prelude::*;

        let tree = PhyloTree::from_newick("((A:0.1,B:0.2),C:0.6);".as_bytes()).unwrap();
        // ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: phylo version
      description: The version from your Cargo.toml, or the commit if building from git.
      placeholder: "3.1.3"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust version
      description: Output of `rustc --version`. The minimum supported version is 1.85.
      placeholder: "rustc 1.85.0"
    validations:
      required: true

  - type: input
    id: features
    attributes:
      label: Feature flags
      description: >
        Which features were enabled? Defaults are `non_crypto_hash` and
        `simple_rooted_tree`.
      placeholder: "default, or e.g. default + parallel"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Backtraces, platform details, or context that might matter.
    validations:
      required: false
